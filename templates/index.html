<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AutoPrice AI | Precision Car Valuation</title>
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #050a12;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 24px 16px;
        }

        .car-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(145deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.55) 100%),
                        url('https://images.unsplash.com/photo-1580273916550-e323be2ae537?q=80&w=2064&auto=format');
            background-size: cover;
            background-position: center 25%;
            background-repeat: no-repeat;
            filter: brightness(0.92) contrast(1.05);
        }

        .car-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, rgba(255,180,40,0.1), rgba(0,0,0,0.6));
            pointer-events: none;
        }

        .predictor-container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .price-head {
            text-align: center;
            margin-bottom: 20px;
        }
        .price-head h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(125deg, #FFFFFF, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(3px);
        }
        .price-head h1 i {
            background: none;
            color: #FFC107;
            font-size: 2rem;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .compact-form {
            background: rgba(12, 20, 30, 0.85);
            backdrop-filter: blur(18px);
            border-radius: 44px;
            padding: 26px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,215,140,0.2);
        }

        .form-vertical {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-field label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff3e0;
            letter-spacing: 0.3px;
            margin-left: 6px;
        }
        .input-field label i {
            width: 24px;
            color: #FFB347;
            font-size: 0.85rem;
            margin-right: 6px;
        }

        .input-field select,
        .input-field input {
            padding: 11px 16px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(255,200,100,0.7);
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            color: #111;
            width: 100%;
            transition: all 0.2s;
        }
        .input-field select:focus, .input-field input:focus {
            outline: none;
            border-color: #FFB347;
            box-shadow: 0 0 0 2px rgba(255,180,71,0.4);
        }

        .input-field input[type="range"] {
            padding: 0;
            height: 5px;
            background: rgba(255,215,140,0.4);
            accent-color: #FFA537;
        }
        .range-hint {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 3px 14px;
            border-radius: 40px;
            color: #FFE1A0;
            width: fit-content;
            backdrop-filter: blur(2px);
            margin-top: 4px;
        }

        .double-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }
        @media (max-width: 560px) {
            .double-group {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .compact-form {
                padding: 20px 18px;
            }
            .price-head h1 {
                font-size: 1.8rem;
            }
        }

        .predict-btn {
            width: 100%;
            padding: 13px 12px;
            background: linear-gradient(100deg, #FFB347, #FF8C33);
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 800;
            color: #1f1a0c;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }
        .predict-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(100deg, #FFA232, #FF7720);
            box-shadow: 0 12px 22px rgba(255,140,0,0.5);
        }

        .result-card-mini {
            margin-top: 26px;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(22px);
            border-radius: 36px;
            padding: 22px 26px;
            text-align: center;
            border: 1px solid rgba(255,180,70,0.6);
            box-shadow: 0 10px 28px rgba(0,0,0,0.5);
        }
        .price-value {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE0A0, #FFB23F);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 8px 0;
        }
        .summary-grid-sm {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
            margin-top: 16px;
            text-align: left;
        }
        .summary-item-sm {
            background: rgba(255, 245, 210, 0.12);
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #FFF5E6;
            border: 0.5px solid rgba(255,200,100,0.25);
        }
        .summary-item-sm strong {
            color: #FFD966;
            font-weight: 700;
        }

        /* VISIBLE TIMER STYLES */
        .visible-timer {
            margin-top: 22px;
            padding: 14px 20px;
            background: linear-gradient(135deg, #0f1a2a, #07111e);
            border-radius: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 2px solid #FFB347;
            box-shadow: 0 0 16px rgba(255, 180, 71, 0.5);
            animation: glowPulse 1.2s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(255, 180, 71, 0.5); border-color: #FFB347; }
            50% { box-shadow: 0 0 22px rgba(255, 180, 71, 0.9); border-color: #FFD966; }
        }
        .timer-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #FFE8C7;
        }
        .timer-left i {
            font-size: 1.3rem;
            color: #FFB347;
            animation: spinSlow 1.2s linear infinite;
        }
        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .timer-number-large {
            background: #FFB347;
            color: #0a0f1f;
            font-weight: 900;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-family: monospace;
            letter-spacing: 2px;
            min-width: 85px;
            display: inline-block;
            text-align: center;
            margin-left: 12px;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.1), 0 3px 10px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .cancel-timer {
            background: rgba(220, 60, 50, 0.3);
            border: 1px solid #ff8866;
            color: #FFCF9A;
            padding: 8px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cancel-timer:hover {
            background: #ff5533;
            border-color: white;
            color: white;
            transform: scale(1.02);
        }
        .cancelled-timer {
            border-color: #4CAF50;
            animation: none;
            background: linear-gradient(135deg, #1e2a1a, #0f1a0f);
            box-shadow: 0 0 10px #4CAF5040;
        }
        .cancelled-timer i {
            animation: none;
            color: #4CAF50;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }
        .spinner-sm {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,180,70,0.25);
            border-top: 3px solid #FFB347;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-msg {
            background: #ffdfdfe6;
            backdrop-filter: blur(8px);
            color: #b91c1c;
            padding: 12px 18px;
            border-radius: 60px;
            margin-top: 18px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
        }
        .footer-credit {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #ccb893;
            font-weight: 500;
        }
        hr {
            border-color: #ffb34760;
            margin: 12px 0 0;
        }
    </style>
</head>
<body>
<div class="car-bg"></div>
<div class="predictor-container">
    <div class="price-head">
        <h1><i class="fas fa-chart-line"></i>Car Price Prediction</h1>
    </div>

    <div class="compact-form">
        <form id="predictionForm" class="form-vertical">
            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-trademark"></i> Brand / Model</label>
                    <select id="name" required>
                        <option value="" disabled selected>— Select brand —</option>
                        <!-- brands injected by backend template via Jinja -->
                    </select>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-calendar-alt"></i> Year</label>
                    <input type="range" id="year" min="1994" max="2024" value="2018">
                    <div class="range-hint"><span id="yearValue">2018</span> model year</div>
                </div>
            </div>

            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-tachometer-alt"></i> Kilometers</label>
                    <input type="range" id="km_driven" min="11" max="210000" value="48000">
                    <div class="range-hint"><span id="kmValue">48,000</span> km</div>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-gas-pump"></i> Fuel Type</label>
                    <select id="fuel" required>
                        <option value="" disabled selected>— Fuel —</option>
                    </select>
                </div>
            </div>

            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-user-tie"></i> Seller Type</label>
                    <select id="seller_type" required>
                        <option value="" disabled selected>— Seller —</option>
                    </select>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-exchange-alt"></i> Transmission</label>
                    <select id="transmission" required>
                        <option value="" disabled selected>— Transmission —</option>
                    </select>
                </div>
            </div>

            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-user-friends"></i> Owner History</label>
                    <select id="owner" required>
                        <option value="" disabled selected>— Owner type —</option>
                    </select>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-leaf"></i> Mileage (km/l)</label>
                    <input type="range" id="mileage" min="10" max="40" step="0.5" value="18.6">
                    <div class="range-hint"><span id="mileageValue">18.6</span> km/l</div>
                </div>
            </div>

            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-microchip"></i> Engine (CC)</label>
                    <input type="range" id="engine" min="700" max="5000" value="1498">
                    <div class="range-hint"><span id="engineValue">1,498</span> cc</div>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-horse-head"></i> Max Power (BHP)</label>
                    <input type="range" id="max_power" min="40" max="250" value="102">
                    <div class="range-hint"><span id="powerValue">102</span> BHP</div>
                </div>
            </div>

            <div class="input-field">
                <label><i class="fas fa-chair"></i> Seats</label>
                <input type="range" id="seats" min="4" max="10" value="5">
                <div class="range-hint"><span id="seatsValue">5</span> seats</div>
            </div>

            <button type="submit" class="predict-btn"><i class="fas fa-brain"></i> Predict Market Value <i class="fas fa-arrow-right"></i></button>
        </form>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner-sm"></div>
            <p style="margin-top: 10px; font-size:0.75rem; color:#FFE0A3;">AI analyzing live dataset & trends...</p>
        </div>
        <div class="error-msg" id="errorMessage" style="display: none;"></div>

        <div id="resultContainer" style="display: none;">
            <div class="result-card-mini">
                <div class="price-value" id="predictedPrice">₹0.00</div>
                <div id="summaryArea"></div>
                <!-- Timer container (visible countdown) -->
                <div id="timerDisplayContainer"></div>
                <hr>
                <div class="footer-credit" style="margin-top: 12px;">✨ ML-based valuation • refresh auto in 20s</div>
            </div>
        </div> 
    </div>
</div>

<script>
    // ---- DYNAMIC LOADING OF ALL FORM OPTIONS (ensures full select rendering even if backend templating partially fails) ----
    // But to guarantee all option lists appear even on render deployment without full backend context,
    // we define comprehensive fallback datasets that will populate selects automatically.
    // The backend Jinja also provides them, but in case of missing we override with rich options.
    
    const BRANDS_FALLBACK = ["Maruti", "Hyundai", "Honda", "Toyota", "Ford", "BMW", "Mercedes-Benz", "Tata", "Mahindra", "Kia", "Volkswagen", "Nissan", "Renault", "Audi", "Skoda", "MG", "Jeep", "Volvo", "Mitsubishi", "Land Rover"];
    const FUEL_FALLBACK = ["Petrol", "Diesel", "CNG", "LPG", "Electric"];
    const SELLER_FALLBACK = ["Individual", "Dealer", "Trustmark Dealer"];
    const TRANSMISSION_FALLBACK = ["Manual", "Automatic"];
    const OWNER_FALLBACK = ["First Owner", "Second Owner", "Third Owner", "Fourth & Above Owner", "Test Drive Car"];
    
    function populateSelect(selectId, options, defaultMsg = "Select") {
        const selectEl = document.getElementById(selectId);
        if (!selectEl) return;
        // Only populate if empty or just placeholder
        if (selectEl.children.length <= 1) {
            selectEl.innerHTML = `<option value="" disabled selected>— ${defaultMsg} —</option>`;
            options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                selectEl.appendChild(option);
            });
        }
    }
    
    // Wait for DOM to ensure elements exist
    document.addEventListener('DOMContentLoaded', () => {
        // Force populate selects
        populateSelect('name', BRANDS_FALLBACK, "Select brand");
        populateSelect('fuel', FUEL_FALLBACK, "Fuel type");
        populateSelect('seller_type', SELLER_FALLBACK, "Seller type");
        populateSelect('transmission', TRANSMISSION_FALLBACK, "Transmission");
        populateSelect('owner', OWNER_FALLBACK, "Owner type");
        
        // Additional check: if backend already rendered, we don't duplicate but ensure no blank
        // Also set default values for first option to avoid empty submission.
        const brandSelect = document.getElementById('name');
        if(brandSelect && brandSelect.options.length > 1 && !brandSelect.value) {
            brandSelect.selectedIndex = 1;
        }
        const fuelSelect = document.getElementById('fuel');
        if(fuelSelect && fuelSelect.options.length > 1 && !fuelSelect.value) fuelSelect.selectedIndex = 1;
        const sellerSelect = document.getElementById('seller_type');
        if(sellerSelect && sellerSelect.options.length > 1 && !sellerSelect.value) sellerSelect.selectedIndex = 1;
        const transSelect = document.getElementById('transmission');
        if(transSelect && transSelect.options.length > 1 && !transSelect.value) transSelect.selectedIndex = 1;
        const ownerSelect = document.getElementById('owner');
        if(ownerSelect && ownerSelect.options.length > 1 && !ownerSelect.value) ownerSelect.selectedIndex = 1;
    });
    
    // Range Sliders update
    const yearSlider = document.getElementById('year');
    const yearSpan = document.getElementById('yearValue');
    const kmSlider = document.getElementById('km_driven');
    const kmSpan = document.getElementById('kmValue');
    const mileageSlider = document.getElementById('mileage');
    const mileageSpan = document.getElementById('mileageValue');
    const engineSlider = document.getElementById('engine');
    const engineSpan = document.getElementById('engineValue');
    const powerSlider = document.getElementById('max_power');
    const powerSpan = document.getElementById('powerValue');
    const seatsSlider = document.getElementById('seats');
    const seatsSpan = document.getElementById('seatsValue');

    function updateYear() { yearSpan.innerText = yearSlider.value; }
    function updateKm() { kmSpan.innerText = parseInt(kmSlider.value).toLocaleString(); }
    function updateMileage() { mileageSpan.innerText = parseFloat(mileageSlider.value).toFixed(1); }
    function updateEngine() { engineSpan.innerText = parseInt(engineSlider.value).toLocaleString(); }
    function updatePower() { powerSpan.innerText = powerSlider.value; }
    function updateSeats() { seatsSpan.innerText = seatsSlider.value; }

    yearSlider.addEventListener('input', updateYear);
    kmSlider.addEventListener('input', updateKm);
    mileageSlider.addEventListener('input', updateMileage);
    engineSlider.addEventListener('input', updateEngine);
    powerSlider.addEventListener('input', updatePower);
    seatsSlider.addEventListener('input', updateSeats);
    updateYear(); updateKm(); updateMileage(); updateEngine(); updatePower(); updateSeats();

    // ========== AUTO-REFRESH TIMER WITH VISIBLE COUNTDOWN (20 sec) ==========
    let refreshTimeoutId = null;
    let countdownIntervalId = null;

    function killAllTimers() {
        if (refreshTimeoutId) { clearTimeout(refreshTimeoutId); refreshTimeoutId = null; }
        if (countdownIntervalId) { clearInterval(countdownIntervalId); countdownIntervalId = null; }
    }

    function cancelAutoRefreshAndShow() {
        killAllTimers();
        const timerContainer = document.getElementById('timerDisplayContainer');
        if (timerContainer) {
            timerContainer.innerHTML = `
                <div class="visible-timer cancelled-timer">
                    <div class="timer-left">
                        <i class="fas fa-check-circle"></i>
                        <span style="color:#b9f6a5;">✓ Auto-refresh cancelled • page will stay</span>
                    </div>
                </div>
            `;
            setTimeout(() => {
                if (timerContainer && timerContainer.innerHTML.includes('cancelled')) {
                    timerContainer.innerHTML = '';
                }
            }, 4500);
        }
    }

    function startVisibleCountdown() {
        killAllTimers();
        let secondsRemaining = 20;
        const timerContainer = document.getElementById('timerDisplayContainer');
        if (!timerContainer) return;
        
        timerContainer.innerHTML = `
            <div class="visible-timer" id="activeTimerWidget">
                <div class="timer-left">
                    <i class="fas fa-sync-alt"></i>
                    <span>Auto refresh in</span>
                    <span class="timer-number-large" id="countdownNumber">20</span>
                    <span>seconds</span>
                </div>
                <button class="cancel-timer" id="cancelRefreshButton">
                    <i class="fas fa-ban"></i> Cancel & Stop
                </button>
            </div>
        `;
        
        const countdownSpan = document.getElementById('countdownNumber');
        countdownIntervalId = setInterval(() => {
            secondsRemaining--;
            if (countdownSpan) {
                countdownSpan.innerText = secondsRemaining;
                if (secondsRemaining <= 5) {
                    countdownSpan.style.background = "#FF6600";
                    countdownSpan.style.color = "white";
                }
                if (secondsRemaining <= 2) {
                    countdownSpan.style.background = "#ff3300";
                }
            }
            if (secondsRemaining <= 0) {
                clearInterval(countdownIntervalId);
                clearTimeout(refreshTimeoutId);
                window.location.reload();
            }
        }, 1000);
        
        refreshTimeoutId = setTimeout(() => {
            if (countdownIntervalId) clearInterval(countdownIntervalId);
            window.location.reload();
        }, 20000);
        
        const cancelBtn = document.getElementById('cancelRefreshButton');
        if (cancelBtn) {
            cancelBtn.addEventListener('click', (e) => {
                e.preventDefault();
                cancelAutoRefreshAndShow();
            });
        }
    }
    
    function resetTimerDisplay() {
        killAllTimers();
        const timerContainer = document.getElementById('timerDisplayContainer');
        if (timerContainer) timerContainer.innerHTML = '';
    }

    // ---- FORM SUBMIT HANDLER ----
    const form = document.getElementById('predictionForm');
    const loadingDiv = document.getElementById('loading');
    const resultContainerDiv = document.getElementById('resultContainer');
    const errorDiv = document.getElementById('errorMessage');
    const predictedPriceSpan = document.getElementById('predictedPrice');
    const summaryArea = document.getElementById('summaryArea');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetTimerDisplay();
        resultContainerDiv.style.display = 'none';
        errorDiv.style.display = 'none';
        loadingDiv.style.display = 'block';

        const getField = (id) => document.getElementById(id).value;
        const nameVal = getField('name');
        const yearVal = getField('year');
        const kmVal = getField('km_driven');
        const fuelVal = getField('fuel');
        const sellerVal = getField('seller_type');
        const transVal = getField('transmission');
        const ownerVal = getField('owner');
        const mileageVal = getField('mileage');
        const engineVal = getField('engine');
        const powerVal = getField('max_power');
        const seatsVal = getField('seats');

        if (!nameVal || !fuelVal || !sellerVal || !transVal || !ownerVal) {
            errorDiv.innerText = "⚠️ Please fill all fields: Brand, Fuel, Seller, Transmission, Owner required.";
            errorDiv.style.display = 'block';
            loadingDiv.style.display = 'none';
            return;
        }

        const formData = {
            name: nameVal,
            year: parseInt(yearVal),
            km_driven: parseInt(kmVal),
            fuel: fuelVal,
            seller_type: sellerVal,
            transmission: transVal,
            owner: ownerVal,
            mileage: parseFloat(mileageVal),
            engine: parseInt(engineVal),
            max_power: parseInt(powerVal),
            seats: parseInt(seatsVal)
        };

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            const result = await response.json();
            if (result.success) {
                const displayPrice = result.formatted_price || `₹${parseFloat(result.price).toLocaleString('en-IN')}`;
                predictedPriceSpan.innerHTML = displayPrice;
                const currentYear = new Date().getFullYear();
                const carAge = currentYear - formData.year;
                summaryArea.innerHTML = `
                    <div style="margin-top: 8px;">
                        <div class="summary-grid-sm">
                            <div class="summary-item-sm"><strong>🚗 Model:</strong> ${formData.name}</div>
                            <div class="summary-item-sm"><strong>📅 Year:</strong> ${formData.year} (${carAge} yrs old)</div>
                            <div class="summary-item-sm"><strong>📊 Odometer:</strong> ${formData.km_driven.toLocaleString()} km</div>
                            <div class="summary-item-sm"><strong>⛽ Fuel:</strong> ${formData.fuel}</div>
                            <div class="summary-item-sm"><strong>⚙️ Transmission:</strong> ${formData.transmission}</div>
                            <div class="summary-item-sm"><strong>🔧 Engine:</strong> ${formData.engine.toLocaleString()} cc</div>
                            <div class="summary-item-sm"><strong>🌿 Mileage:</strong> ${formData.mileage} km/l</div>
                            <div class="summary-item-sm"><strong>💪 Power:</strong> ${formData.max_power} BHP</div>
                            <div class="summary-item-sm"><strong>🪑 Seats:</strong> ${formData.seats}</div>
                            <div class="summary-item-sm"><strong>👥 Ownership:</strong> ${formData.owner}</div>
                            <div class="summary-item-sm"><strong>🏷️ Seller:</strong> ${formData.seller_type}</div>
                        </div>
                    </div>
                `;
                resultContainerDiv.style.display = 'block';
                startVisibleCountdown();  // launch visible timer after prediction
            } else {
                errorDiv.innerText = `Prediction failed: ${result.error || 'Check backend model'}`;
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.innerText = `⚠️ Server error: ${err.message}. Ensure Flask backend is running (model.pkl + Cardetails.csv). Using demo mode? But backend required.`;
            errorDiv.style.display = 'block';
        } finally {
            loadingDiv.style.display = 'none';
        }
    });
    
    window.addEventListener('beforeunload', () => killAllTimers());
</script>
</body>
</html>
