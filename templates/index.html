<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AutoPrice AI | Car Value Predictor</title>
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #050a12;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 24px 16px;
        }

        .car-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(145deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.5) 100%),
                        url('https://images.unsplash.com/photo-1580273916550-e323be2ae537?q=80&w=2064&auto=format');
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            filter: brightness(0.95) contrast(1.08);
        }

        .car-bg::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, rgba(255,180,40,0.08), rgba(0,0,0,0.55));
            pointer-events: none;
        }

        .predictor-container {
            max-width: 640px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .price-head {
            text-align: center;
            margin-bottom: 20px;
        }
        .price-head h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(125deg, #FFFFFF, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(3px);
        }
        .price-head h1 i {
            background: none;
            color: #FFC107;
            font-size: 2rem;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .compact-form {
            background: rgba(12, 20, 30, 0.82);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 22px 26px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,200,0.15);
        }

        .form-vertical {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-field label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #fff3e0;
            letter-spacing: 0.3px;
            margin-left: 6px;
        }
        .input-field label i {
            width: 24px;
            color: #FFB347;
            font-size: 0.85rem;
            margin-right: 6px;
        }

        .input-field select,
        .input-field input {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(255,200,120,0.5);
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            color: #111;
            width: 100%;
        }

        .input-field input[type="range"] {
            padding: 0;
            height: 5px;
            background: rgba(255,215,140,0.4);
            accent-color: #FFA537;
        }
        .range-hint {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 3px 12px;
            border-radius: 40px;
            color: #FFE1A0;
            width: fit-content;
            backdrop-filter: blur(2px);
            margin-top: 4px;
        }

        .double-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 520px) {
            .double-group {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .compact-form {
                padding: 18px 20px;
            }
            .price-head h1 {
                font-size: 1.8rem;
            }
        }

        .predict-btn {
            width: 100%;
            padding: 12px 12px;
            background: linear-gradient(100deg, #FFB347, #FF8C33);
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 800;
            color: #1f1a0c;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .predict-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(100deg, #FFA232, #FF7720);
            box-shadow: 0 12px 20px rgba(255,140,0,0.4);
        }

        .result-card-mini {
            margin-top: 24px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px 24px;
            text-align: center;
            border: 1px solid rgba(255,180,70,0.5);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .price-value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFDF9C, #FFB23F);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 8px 0;
        }
        .summary-grid-sm {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 10px;
            margin-top: 16px;
            text-align: left;
        }
        .summary-item-sm {
            background: rgba(255, 245, 210, 0.12);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #FFF5E6;
            border: 0.5px solid rgba(255,200,100,0.2);
        }
        .summary-item-sm strong {
            color: #FFD966;
            font-weight: 700;
        }
        .result-card-mini hr {
            border-color: #ffb34760;
            margin: 14px 0 8px;
        }

        /* ========== VISIBLE TIMER STYLES ========== */
        .visible-timer {
            margin-top: 20px;
            padding: 12px 18px;
            background: linear-gradient(135deg, #0f172a, #0a0f1f);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 2px solid #FFB347;
            box-shadow: 0 0 16px rgba(255, 180, 71, 0.4);
            animation: glowPulse 1s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(255, 180, 71, 0.4); border-color: #FFB347; }
            50% { box-shadow: 0 0 20px rgba(255, 180, 71, 0.8); border-color: #FFD966; }
        }
        .timer-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #FFE8C7;
        }
        .timer-left i {
            font-size: 1.3rem;
            color: #FFB347;
            animation: spinSlow 1s linear infinite;
        }
        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .timer-number-large {
            background: #FFB347;
            color: #0a0f1f;
            font-weight: 900;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-family: monospace;
            letter-spacing: 2px;
            min-width: 75px;
            display: inline-block;
            text-align: center;
            margin-left: 10px;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.3);
        }
        .cancel-timer {
            background: rgba(220, 60, 50, 0.25);
            border: 1px solid #ff8866;
            color: #FFB347;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cancel-timer:hover {
            background: #ff5533;
            border-color: white;
            color: white;
            transform: scale(1.03);
        }
        .cancelled-timer {
            border-color: #4CAF50;
            animation: none;
            background: linear-gradient(135deg, #1a2a1a, #0f1a0f);
        }
        .cancelled-timer i {
            animation: none;
            color: #4CAF50;
        }

        .loading {
            text-align: center;
            padding: 18px;
        }
        .spinner-sm {
            width: 34px;
            height: 34px;
            border: 3px solid rgba(255,180,70,0.2);
            border-top: 3px solid #FFB347;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error-msg {
            background: #ffdfdfcc;
            backdrop-filter: blur(8px);
            color: #b91c1c;
            padding: 10px 16px;
            border-radius: 40px;
            margin-top: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
        }
        .footer-credit {
            text-align: center;
            font-size: 0.65rem;
            margin-top: 20px;
            color: #ccb893;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="car-bg"></div>
<div class="predictor-container">
    <div class="price-head">
        <h1><i class="fas fa-car"></i> Car Price Prediction</h1>
    </div>

    <div class="compact-form">
        <form id="predictionForm" class="form-vertical">
            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-trademark"></i> Brand</label>
                    <select id="name" required>
                        <option value="">Select</option>
                        {% for brand in brands %}
                        <option value="{{ brand }}">{{ brand }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-calendar-alt"></i> Year</label>
                    <input type="range" id="year" min="1994" max="2024" value="2018">
                    <div class="range-hint"><span id="yearValue">2018</span> model</div>
                </div>
            </div>

            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-tachometer-alt"></i> Kilometers</label>
                    <input type="range" id="km_driven" min="11" max="210000" value="48000">
                    <div class="range-hint"><span id="kmValue">48,000</span> km</div>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-gas-pump"></i> Fuel</label>
                    <select id="fuel" required>
                        <option value="">Fuel type</option>
                        {% for fuel in fuel_types %}
                        <option value="{{ fuel }}">{{ fuel }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-user-tie"></i> Seller</label>
                    <select id="seller_type" required>
                        <option value="">Seller type</option>
                        {% for seller in seller_types %}
                        <option value="{{ seller }}">{{ seller }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-exchange-alt"></i> Transmission</label>
                    <select id="transmission" required>
                        <option value="">Transmission</option>
                        {% for trans in transmission_types %}
                        <option value="{{ trans }}">{{ trans }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-user-friends"></i> Owner</label>
                    <select id="owner" required>
                        <option value="">Owner type</option>
                        {% for owner in owner_types %}
                        <option value="{{ owner }}">{{ owner }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-leaf"></i> Mileage (km/l)</label>
                    <input type="range" id="mileage" min="10" max="40" step="0.5" value="18.6">
                    <div class="range-hint"><span id="mileageValue">18.6</span> km/l</div>
                </div>
            </div>

            <div class="double-group">
                <div class="input-field">
                    <label><i class="fas fa-microchip"></i> Engine (CC)</label>
                    <input type="range" id="engine" min="700" max="5000" value="1498">
                    <div class="range-hint"><span id="engineValue">1,498</span> cc</div>
                </div>
                <div class="input-field">
                    <label><i class="fas fa-horse-head"></i> Max Power (BHP)</label>
                    <input type="range" id="max_power" min="40" max="250" value="102">
                    <div class="range-hint"><span id="powerValue">102</span> BHP</div>
                </div>
            </div>

            <div class="input-field">
                <label><i class="fas fa-chair"></i> Seats</label>
                <input type="range" id="seats" min="4" max="10" value="5">
                <div class="range-hint"><span id="seatsValue">5</span> seats</div>
            </div>

            <button type="submit" class="predict-btn"><i class="fas fa-chart-simple"></i> Predict value <i class="fas fa-arrow-right"></i></button>
        </form>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner-sm"></div>
            <p style="margin-top: 10px; font-size:0.75rem; color:#FFE0A3;">ML engine analyzing market data...</p>
        </div>
        <div class="error-msg" id="errorMessage" style="display: none;"></div>

        <div id="resultContainer" style="display: none;">
            <div class="result-card-mini">
                <div class="price-value" id="predictedPrice">₹0.00</div>
                <div id="summaryArea"></div>
                <!-- VISIBLE TIMER CONTAINER - WILL SHOW COUNTDOWN -->
                <div id="timerDisplayContainer"></div>
                <hr>
                
            </div>
        </div>
        
    </div>
</div>

<script>
    // Range sliders update
    const yearSlider = document.getElementById('year');
    const yearSpan = document.getElementById('yearValue');
    const kmSlider = document.getElementById('km_driven');
    const kmSpan = document.getElementById('kmValue');
    const mileageSlider = document.getElementById('mileage');
    const mileageSpan = document.getElementById('mileageValue');
    const engineSlider = document.getElementById('engine');
    const engineSpan = document.getElementById('engineValue');
    const powerSlider = document.getElementById('max_power');
    const powerSpan = document.getElementById('powerValue');
    const seatsSlider = document.getElementById('seats');
    const seatsSpan = document.getElementById('seatsValue');

    function updateYear() { yearSpan.innerText = yearSlider.value; }
    function updateKm() { kmSpan.innerText = parseInt(kmSlider.value).toLocaleString(); }
    function updateMileage() { mileageSpan.innerText = parseFloat(mileageSlider.value).toFixed(1); }
    function updateEngine() { engineSpan.innerText = parseInt(engineSlider.value).toLocaleString(); }
    function updatePower() { powerSpan.innerText = powerSlider.value; }
    function updateSeats() { seatsSpan.innerText = seatsSlider.value; }

    yearSlider.addEventListener('input', updateYear);
    kmSlider.addEventListener('input', updateKm);
    mileageSlider.addEventListener('input', updateMileage);
    engineSlider.addEventListener('input', updateEngine);
    powerSlider.addEventListener('input', updatePower);
    seatsSlider.addEventListener('input', updateSeats);
    updateYear(); updateKm(); updateMileage(); updateEngine(); updatePower(); updateSeats();

    // ========== AUTO-REFRESH TIMER WITH VISIBLE COUNTDOWN (20 SECONDS) ==========
    let refreshTimeoutId = null;
    let countdownIntervalId = null;

    // Function to stop all timers completely
    function killAllTimers() {
        if (refreshTimeoutId) {
            clearTimeout(refreshTimeoutId);
            refreshTimeoutId = null;
        }
        if (countdownIntervalId) {
            clearInterval(countdownIntervalId);
            countdownIntervalId = null;
        }
    }

    // Function to clear timer and show cancelled message
    function cancelAutoRefreshAndShow() {
        killAllTimers();
        const timerContainer = document.getElementById('timerDisplayContainer');
        if (timerContainer) {
            timerContainer.innerHTML = `
                <div class="visible-timer cancelled-timer">
                    <div class="timer-left">
                        <i class="fas fa-check-circle"></i>
                        <span style="color:#a5d6a5;">✓ Auto-refresh cancelled · Page will not reload</span>
                    </div>
                </div>
            `;
            // Auto-remove cancelled message after 4 seconds but keep container clean
            setTimeout(() => {
                if (timerContainer && timerContainer.innerHTML.includes('cancelled')) {
                    timerContainer.innerHTML = '';
                }
            }, 4000);
        }
    }

    // Function to start the VISIBLE 20-second countdown timer
    function startVisibleCountdown() {
        // Kill any existing timers first
        killAllTimers();
        
        let secondsRemaining = 20;
        const timerContainer = document.getElementById('timerDisplayContainer');
        if (!timerContainer) return;
        
        // Create the visible timer UI
        
        
        // Update countdown every second
        countdownIntervalId = setInterval(() => {
            secondsRemaining--;
            const countdownSpan = document.getElementById('countdownNumber');
            if (countdownSpan) {
                countdownSpan.innerText = secondsRemaining;
                // Change color when low on time
                if (secondsRemaining <= 5) {
                    countdownSpan.style.background = "#FF6600";
                    countdownSpan.style.color = "white";
                    countdownSpan.style.transform = "scale(1.05)";
                }
                if (secondsRemaining <= 2) {
                    countdownSpan.style.background = "#ff3300";
                }
            }
            
            if (secondsRemaining <= 0) {
                // Time's up! Refresh the page
                if (countdownIntervalId) clearInterval(countdownIntervalId);
                if (refreshTimeoutId) clearTimeout(refreshTimeoutId);
                window.location.reload();
            }
        }, 1000);
        
        // Backup timeout to refresh after exactly 20 seconds
        refreshTimeoutId = setTimeout(() => {
            if (countdownIntervalId) clearInterval(countdownIntervalId);
            window.location.reload();
        }, 20000);
        
        // Attach cancel button event
        const cancelBtn = document.getElementById('cancelRefreshButton');
        if (cancelBtn) {
            // Remove any previous listener by cloning and replacing
            const newCancelBtn = cancelBtn.cloneNode(true);
            cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);
            newCancelBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                cancelAutoRefreshAndShow();
            });
        }
    }
    
    // Reset timer display and clear any pending refresh (called before new prediction)
    function resetTimerDisplay() {
        killAllTimers();
        const timerContainer = document.getElementById('timerDisplayContainer');
        if (timerContainer) {
            timerContainer.innerHTML = '';  // Clear timer area entirely
        }
    }

    // Form submission handler
    const form = document.getElementById('predictionForm');
    const loadingDiv = document.getElementById('loading');
    const resultContainerDiv = document.getElementById('resultContainer');
    const errorDiv = document.getElementById('errorMessage');
    const predictedPriceSpan = document.getElementById('predictedPrice');
    const summaryArea = document.getElementById('summaryArea');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset any existing timer before new prediction
        resetTimerDisplay();
        
        resultContainerDiv.style.display = 'none';
        errorDiv.style.display = 'none';
        loadingDiv.style.display = 'block';

        const getField = (id) => document.getElementById(id).value;
        const formData = {
            name: getField('name'),
            year: getField('year'),
            km_driven: getField('km_driven'),
            fuel: getField('fuel'),
            seller_type: getField('seller_type'),
            transmission: getField('transmission'),
            owner: getField('owner'),
            mileage: getField('mileage'),
            engine: getField('engine'),
            max_power: getField('max_power'),
            seats: getField('seats')
        };

        // Validation
        for (let [key, val] of Object.entries(formData)) {
            if (!val || val === "") {
                errorDiv.innerText = `⚠️ Please complete: ${key.replace(/_/g, ' ')}`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                return;
            }
        }

        try {
            const response = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            const result = await response.json();
            if (result.success) {
                const displayPrice = result.formatted_price || `₹${parseFloat(result.price).toLocaleString('en-IN')}`;
                predictedPriceSpan.innerHTML = displayPrice;
                const currentYear = new Date().getFullYear();
                const carAge = currentYear - parseInt(formData.year);
                
                summaryArea.innerHTML = `
                    <div style="margin-top: 10px;">
                        <div class="summary-grid-sm">
                            <div class="summary-item-sm"><strong>🚗 Brand:</strong> ${formData.name}</div>
                            <div class="summary-item-sm"><strong>📅 Year:</strong> ${formData.year} (${carAge} yrs)</div>
                            <div class="summary-item-sm"><strong>📊 Kilometers:</strong> ${parseInt(formData.km_driven).toLocaleString()} km</div>
                            <div class="summary-item-sm"><strong>⛽ Fuel:</strong> ${formData.fuel}</div>
                            <div class="summary-item-sm"><strong>⚙️ Transmission:</strong> ${formData.transmission}</div>
                            <div class="summary-item-sm"><strong>🔧 Engine:</strong> ${parseInt(formData.engine).toLocaleString()} cc</div>
                            <div class="summary-item-sm"><strong>🌿 Mileage:</strong> ${formData.mileage} km/l</div>
                            <div class="summary-item-sm"><strong>💪 Power:</strong> ${formData.max_power} BHP</div>
                            <div class="summary-item-sm"><strong>🪑 Seats:</strong> ${formData.seats}</div>
                            <div class="summary-item-sm"><strong>👥 Owner:</strong> ${formData.owner}</div>
                            <div class="summary-item-sm"><strong>🏷️ Seller:</strong> ${formData.seller_type}</div>
                        </div>
                    </div>
                `;
                resultContainerDiv.style.display = 'block';
                
                // START THE VISIBLE 20-SECOND COUNTDOWN TIMER
                startVisibleCountdown();
                
            } else {
                errorDiv.innerText = `Prediction error: ${result.error || 'Invalid data'}`;
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.innerText = `⚠️ Server error: ${err.message}. Make sure Flask backend is running.`;
            errorDiv.style.display = 'block';
        } finally {
            loadingDiv.style.display = 'none';
        }
    });
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
        killAllTimers();
    });
</script>
</body>
</html>
